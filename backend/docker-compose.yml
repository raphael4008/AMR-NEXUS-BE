version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=amr_nexus_db
      - FRONTEND_CORS_ORIGINS=["http://localhost:3000","https://dashboard.amr-nexus.org"]
      - AT_USERNAME=${AT_USERNAME:-sandbox}
      - AT_API_KEY=${AT_API_KEY:-sandbox}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-sk-ant-stub}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=amr_nexus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
